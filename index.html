<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#eaf2fc;
    --bg-mid:#dce9f9;
    --ink:#1b2438;
    --navy:#22345c;
    --accent:#2451c7;
    --accent-soft: rgba(36,81,199,0.12);
    --accent-soft2: rgba(36,81,199,0.20);
    --line: rgba(34,52,92,0.18);
    --muted:#5c657c;
    --glass-bg: rgba(255,255,255,0.5);
    --glass-bg-strong: rgba(255,255,255,0.7);
    --glass-border: rgba(255,255,255,0.75);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;color:var(--ink);font-family:'IBM Plex Sans KR', sans-serif;min-height:100%;}
  body{
    position:relative;overflow-x:hidden;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-top) 100%);
  }

  .wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:36px 22px 90px;}

  .masthead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
    border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:24px;}
  .masthead-left{display:flex;align-items:center;gap:14px;}
  .bubble-mark{width:66px;height:66px;flex-shrink:0;object-fit:contain;}
  .masthead h1{font-family:'Playfair Display', serif;font-weight:700;font-size:38px;letter-spacing:0.2px;margin:0;color:var(--navy);}
  .masthead .sub{font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

  /* category tabs: glassmorphism droplet pills */
  .tabs{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px;}
  .tab{
    font-family:'IBM Plex Sans KR', sans-serif;font-weight:600;font-size:13px;color:var(--navy);
    background:var(--glass-bg);border:1px solid var(--glass-border);
    border-radius:999px;padding:9px 20px;cursor:pointer;
    backdrop-filter:blur(10px) saturate(160%); -webkit-backdrop-filter:blur(10px) saturate(160%);
    box-shadow:0 4px 14px rgba(36,81,199,0.10), inset 0 1px 0 rgba(255,255,255,0.7);
    transition:all .15s ease;white-space:nowrap;
  }
  .tab:hover{box-shadow:0 6px 18px rgba(36,81,199,0.18), inset 0 1px 0 rgba(255,255,255,0.8);}
  .tab.active{background:rgba(36,81,199,0.20);border-color:rgba(36,81,199,0.4);color:var(--navy);
    box-shadow:0 4px 18px rgba(36,81,199,0.25), inset 0 1px 0 rgba(255,255,255,0.5);}
  .tab.add{border-style:dashed;color:var(--muted);background:rgba(255,255,255,0.25);}
  .tab-edit{margin-left:8px;opacity:0.55;}
  .tab-edit:hover{opacity:1;color:var(--accent);}
  .tab-remove{margin-left:8px;opacity:0.55;}
  .tab-remove:hover{opacity:1;color:#c0392b;}
  .tab-input-wrap{display:flex;gap:6px;align-items:center;}
  .tab-input-wrap input{
    background:var(--glass-bg-strong);border:1px solid var(--glass-border);border-radius:999px;color:var(--ink);
    padding:8px 16px;font-size:13px;font-family:'IBM Plex Sans KR', sans-serif;outline:none;width:150px;
    backdrop-filter:blur(8px);
  }

  .dropzone{
    position:relative;background:var(--glass-bg);
    border:1px solid var(--glass-border);border-radius:20px;padding:30px 22px;margin-bottom:28px;text-align:center;
    backdrop-filter:blur(10px) saturate(160%); -webkit-backdrop-filter:blur(10px) saturate(160%);
    box-shadow:0 8px 28px rgba(36,81,199,0.10), inset 0 1px 0 rgba(255,255,255,0.7);
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .dropzone.dragover{box-shadow:0 0 0 2px var(--accent), 0 8px 28px rgba(36,81,199,0.2);}
  .dropzone p{margin:4px 0;font-size:13.5px;color:var(--muted);}
  .dropzone .big{font-family:'Playfair Display', serif;font-weight:600;font-size:19px;color:var(--navy);}
  .dropzone .actions{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

  button, .btn{
    font-family:'IBM Plex Sans KR', sans-serif;background:var(--navy);color:#fff;border:none;
    padding:10px 18px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;
    transition:opacity .12s ease, transform .1s ease;
  }
  button:hover{opacity:0.85;}
  button.ghost{background:var(--glass-bg-strong);color:var(--navy);border:1px solid var(--glass-border);backdrop-filter:blur(8px);}
  button.ghost:hover{box-shadow:0 4px 14px rgba(36,81,199,0.15);}
  button.danger{background:#c0392b;}
  button.small{padding:8px 12px;font-size:11.5px;white-space:nowrap;}
  input[type=file]{display:none;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));gap:18px;}

  .section-header{display:flex;align-items:center;justify-content:space-between;margin:34px 0 16px;}
  .section-header h2{font-family:'Playfair Display', serif;font-weight:600;font-size:22px;color:var(--navy);margin:0;}

  .editor-toolbar{display:flex;gap:6px;margin-bottom:8px;}
  .note-editor{
    min-height:140px;max-height:320px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:13.5px;line-height:1.6;color:var(--ink);background:rgba(255,255,255,0.7);
  }
  .note-editor:focus{outline:none;border-color:var(--accent);}
  .note-editor img{max-width:100%;border-radius:8px;margin:6px 0;display:block;}
  .note-editor a{color:var(--accent);}
  .note-editor:empty:before{content:attr(data-placeholder);color:var(--muted);}
  .memo-preview{font-size:12px;color:var(--ink);margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:16px;}
  .memo-preview.memo-empty{color:var(--muted);font-style:italic;}

  .card{
    position:relative;display:flex;align-items:stretch;height:172px;
    background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:20px;cursor:pointer;overflow:hidden;
    backdrop-filter:blur(10px) saturate(160%); -webkit-backdrop-filter:blur(10px) saturate(160%);
    box-shadow:0 8px 26px rgba(36,81,199,0.10), inset 0 1px 0 rgba(255,255,255,0.6);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(36,81,199,0.18), inset 0 1px 0 rgba(255,255,255,0.7);}

  .porthole-wrap{width:130px;flex-shrink:0;position:relative;overflow:hidden;
    background:#0d1220;}
  .porthole{
    width:100%;height:100%;
    background:#0d1220;display:flex;align-items:center;justify-content:center;
  }
  .porthole img{width:100%;height:100%;object-fit:cover;}
  .porthole .ph-placeholder{font-family:'IBM Plex Sans KR', sans-serif;font-size:10px;text-align:center;color:#cfd8ea;padding:0 8px;line-height:1.25;}

  .card-body{flex:1;min-width:0;padding:13px 18px;display:flex;flex-direction:column;justify-content:center;gap:5px;}
  .card-doi{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--muted);letter-spacing:0.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-title{font-family:'Playfair Display', serif;font-weight:600;font-size:16px;line-height:1.3;margin:0;color:var(--navy);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-meta{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .memo-line{font-size:12px;color:var(--ink);margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:16px;}
  .memo-empty{color:var(--muted);font-style:italic;}
  .memo-underline{text-decoration:underline;text-decoration-color:var(--accent);text-decoration-thickness:1.5px;}
  .cat-chip{position:absolute;top:10px;right:12px;font-size:10px;font-weight:600;padding:4px 12px;
    background:rgba(255,255,255,0.55);color:var(--navy);border:1px solid var(--glass-border);border-radius:999px;
    backdrop-filter:blur(6px);}

  .empty-state{text-align:center;padding:70px 20px;color:var(--muted);}
  .empty-state .big{font-family:'Playfair Display', serif;font-weight:700;font-size:21px;color:var(--navy);margin-bottom:8px;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,28,48,0.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(2px);}
  .overlay.open{display:flex;}
  .modal{background:rgba(255,255,255,0.85);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
    border:1px solid var(--glass-border);border-radius:22px;box-shadow:0 30px 70px rgba(20,28,48,0.25);
    backdrop-filter:blur(16px) saturate(160%); -webkit-backdrop-filter:blur(16px) saturate(160%);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
  .modal-head h2{font-family:'Playfair Display', serif;font-weight:600;font-size:19px;margin:0;color:var(--navy);}
  .modal-body{padding:18px 22px;}
  .modal-thumb{width:100%;max-height:220px;object-fit:contain;background:rgba(255,255,255,0.5);border:1px solid var(--glass-border);border-radius:14px;margin-bottom:14px;}

  label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin:14px 0 5px;font-weight:600;}
  label:first-of-type{margin-top:0;}
  input[type=text], textarea, select{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 12px;
    font-family:'IBM Plex Sans KR', sans-serif;font-size:13.5px;color:var(--ink);background:rgba(255,255,255,0.7);
  }
  input[type=text]:focus, textarea:focus, select:focus{outline:none;border-color:var(--accent);}
  textarea{resize:vertical;min-height:70px;line-height:1.5;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .if-row{display:flex;gap:6px;flex-wrap:wrap;}
  .if-row input{flex:1;min-width:0;}
  .lookup-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .modal-foot{display:flex;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--line);}
  .status-line{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px;}
  .apa-box{background:rgba(255,255,255,0.6);border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font-size:13px;line-height:1.6;color:var(--ink);min-height:20px;}
  .close-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;}
  .close-x:hover{color:var(--accent);}
</style>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const STORE_KEY = "papers-v1";
const CAT_KEY = "categories-v1";
const NOTES_KEY = "notes-v1";

let papers = [];
let categories = [];
let notes = [];
let activeCategory = "전체";
let currentId = null;
let currentNoteId = null;
let savedNoteRange = null;

async function loadPapers(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    papers = raw ? JSON.parse(raw) : [];
  }catch(e){ papers = []; }
}

async function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(papers)); }
  catch(e){ console.error("저장 실패", e); }
}

async function loadNotes(){
  try{
    const raw = localStorage.getItem(NOTES_KEY);
    notes = raw ? JSON.parse(raw) : [];
  }catch(e){ notes = []; }
}

async function persistNotes(){
  try{ localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }
  catch(e){ console.error("저장 실패", e); }
}

async function loadCategories(){
  try{
    const raw = localStorage.getItem(CAT_KEY);
    categories = raw ? JSON.parse(raw) : [];
  }catch(e){ categories = []; }
}

async function persistCategories(){
  try{ localStorage.setItem(CAT_KEY, JSON.stringify(categories)); }
  catch(e){ console.error("저장 실패", e); }
}

/* ---------- 백업 내보내기 / 불러오기 ---------- */
function exportBackup(){
  const backup = {
    type: "research-aquarium-backup",
    version: 1,
    exportedAt: new Date().toISOString(),
    papers: papers,
    categories: categories,
    notes: notes
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `research-aquarium-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importBackup(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || !Array.isArray(data.papers)){
      alert("올바른 백업 파일이 아니에요.");
      return;
    }
    const replace = confirm(
      "현재 데이터를 백업 파일 내용으로 덮어쓸까요?\n" +
      "확인 = 덮어쓰기, 취소 = 기존 데이터에 추가하기"
    );
    if(replace){
      papers = Array.isArray(data.papers) ? data.papers : [];
      categories = Array.isArray(data.categories) ? data.categories : [];
      notes = Array.isArray(data.notes) ? data.notes : [];
    }else{
      const existingIds = new Set(papers.map(p=>p.id));
      (data.papers||[]).forEach(p=>{ if(!existingIds.has(p.id)) papers.push(p); });
      const existingCats = new Set(categories);
      (data.categories||[]).forEach(c=>{ if(!existingCats.has(c)) categories.push(c); });
      const existingNoteIds = new Set(notes.map(n=>n.id));
      (data.notes||[]).forEach(n=>{ if(!existingNoteIds.has(n.id)) notes.push(n); });
    }
    await persist();
    await persistCategories();
    await persistNotes();
    renderTabs();
    render();
    renderNotes();
    alert("백업을 불러왔어요.");
  }catch(e){
    console.error(e);
    alert("백업 파일을 읽지 못했어요.");
  }
}

document.getElementById('backupInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];

function escapeHtml(str){
  if(!str) return "";
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------- tabs ---------- */
let editingCategory = null;

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = "";

  const allTab = document.createElement('div');
  allTab.className = "tab" + (activeCategory === "전체" ? " active" : "");
  allTab.textContent = "전체";
  allTab.onclick = ()=>{ activeCategory = "전체"; renderTabs(); render(); renderNotes(); };
  tabsEl.appendChild(allTab);

  categories.forEach(cat=>{
    if(cat === editingCategory){
      const wrap = document.createElement('div');
      wrap.className = "tab-input-wrap";
      wrap.innerHTML = `<input type="text" id="renameInput" value="${escapeHtml(cat)}"><button class="small" onclick="confirmRenameTab('${escapeHtml(cat).replace(/'/g,"\\'")}')">저장</button><button class="small ghost" onclick="cancelRenameTab()">취소</button>`;
      tabsEl.appendChild(wrap);
      return;
    }
    const tab = document.createElement('div');
    tab.className = "tab" + (activeCategory === cat ? " active" : "");
    tab.innerHTML = `${escapeHtml(cat)} <span class="tab-edit" onclick="event.stopPropagation();startRenameTab('${escapeHtml(cat).replace(/'/g,"\\'")}')">✎</span><span class="tab-remove" onclick="event.stopPropagation();removeCategory('${escapeHtml(cat).replace(/'/g,"\\'")}')">✕</span>`;
    tab.onclick = ()=>{ activeCategory = cat; renderTabs(); render(); renderNotes(); };
    tabsEl.appendChild(tab);
  });

  const addTab = document.createElement('div');
  addTab.className = "tab add";
  addTab.textContent = "+ 카테고리 추가";
  addTab.onclick = ()=> showTabInput();
  tabsEl.appendChild(addTab);

  const renameInput = document.getElementById('renameInput');
  if(renameInput){
    renameInput.focus();
    renameInput.select();
    renameInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') confirmRenameTab(editingCategory);
      if(e.key === 'Escape') cancelRenameTab();
    });
  }
}

function startRenameTab(cat){
  editingCategory = cat;
  renderTabs();
}

function cancelRenameTab(){
  editingCategory = null;
  renderTabs();
}

async function confirmRenameTab(oldName){
  const input = document.getElementById('renameInput');
  const newName = input ? input.value.trim() : "";
  if(newName && newName !== oldName && !categories.includes(newName)){
    const idx = categories.indexOf(oldName);
    if(idx>-1) categories[idx] = newName;
    papers.forEach(p=>{ if(p.category === oldName) p.category = newName; });
    notes.forEach(n=>{ if(n.category === oldName) n.category = newName; });
    if(activeCategory === oldName) activeCategory = newName;
    await persistCategories();
    await persist();
    await persistNotes();
  }
  editingCategory = null;
  renderTabs();
  render();
  renderNotes();
}

function showTabInput(){
  const tabsEl = document.getElementById('tabs');
  const wrap = document.createElement('div');
  wrap.className = "tab-input-wrap";
  wrap.innerHTML = `<input type="text" id="newTabInput" placeholder="예: 수면 연구"><button class="small" onclick="confirmAddTab()">추가</button>`;
  tabsEl.appendChild(wrap);
  const inp = document.getElementById('newTabInput');
  inp.focus();
  inp.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') confirmAddTab(); });
}

async function confirmAddTab(){
  const inp = document.getElementById('newTabInput');
  const name = inp.value.trim();
  if(name && !categories.includes(name)){
    categories.push(name);
    await persistCategories();
    activeCategory = name;
  }
  renderTabs();
  render();
  renderNotes();
}

async function removeCategory(cat){
  categories = categories.filter(c=>c!==cat);
  await persistCategories();
  if(activeCategory === cat) activeCategory = "전체";
  renderTabs();
  render();
  renderNotes();
}

/* ---------- grid render ---------- */
function render(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = "";
  const visible = papers.filter(p => activeCategory === "전체" || p.category === activeCategory);
  if(visible.length === 0){
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  visible.slice().reverse().forEach(p=>{
    const card = document.createElement('div');
    card.className = "card";
    card.onclick = ()=>openEditModal(p.id);
    const thumbHtml = p.thumbnail
      ? `<img src="${p.thumbnail}">`
      : `<div class="ph-placeholder">${escapeHtml(p.journal || '표지 없음')}</div>`;
    const metaParts = [];
    if(p.journal) metaParts.push(escapeHtml(p.journal));
    if(p.ifValue) metaParts.push("IF " + escapeHtml(p.ifValue));
    if(p.citations) metaParts.push("인용 " + escapeHtml(p.citations));
    if(p.pubDate) metaParts.push(escapeHtml(p.pubDate));
    card.innerHTML = `
      ${p.category ? `<div class="cat-chip">${escapeHtml(p.category)}</div>` : ""}
      <div class="porthole-wrap">
        <div class="porthole">${thumbHtml}</div>
      </div>
      <div class="card-body">
        ${p.doi ? `<div class="card-doi">${escapeHtml(p.doi)}</div>` : ""}
        <div class="card-title">${escapeHtml(p.title || "제목 없음")}</div>
        <div class="card-meta">${metaParts.join(" · ")}</div>
        <div class="memo-line ${p.memo ? "" : "memo-empty"}">${p.memo ? escapeHtml(p.memo) : "메모 없음 — <span class=\"memo-underline\">왜 가져왔는지</span> 적어보세요"}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function execCmd(cmd){

}

function saveNoteSelection(){
  const sel = window.getSelection();
  if(sel.rangeCount > 0){
    const range = sel.getRangeAt(0);
    if(document.getElementById('noteEditor').contains(range.commonAncestorContainer)){
      savedNoteRange = range.cloneRange();
    }
  }
}

function promptLink(){
  saveNoteSelection();
  document.getElementById('linkInputRow').style.display = 'flex';
  document.getElementById('linkUrlInput').focus();
}

function cancelLink(){
  document.getElementById('linkInputRow').style.display = 'none';
  document.getElementById('linkUrlInput').value = '';
  savedNoteRange = null;
}

function confirmLink(){
  const url = document.getElementById('linkUrlInput').value.trim();
  const editor = document.getElementById('noteEditor');
  editor.focus();
  if(savedNoteRange){
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedNoteRange);
  }
  if(url){
    if(savedNoteRange && !savedNoteRange.collapsed){
      document.execCommand('createLink', false, url);
    }else{
      document.execCommand('insertHTML', false, `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>&nbsp;`);
    }
  }
  cancelLink();
}

});
/* ---------- DOI / metadata ---------- */
function extractDoi(text){
  const m = text.match(/10\.\d{4,9}\/[^\s"'<>]+/i);
  return m ? m[0].replace(/[.,;)]+$/,'') : null;
}

async function fetchMetadata(doi){
  const status = document.getElementById('statusLine');
  status.textContent = "논문 정보 검색 중... (몇 초 걸릴 수 있어요)";
  try{
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1500,
        tools: [{type: "web_search_20250305", name: "web_search"}],
        messages: [{
          role: "user",
          content: `Search the web for the academic paper with DOI ${doi}. Do this in steps:
1. First find its exact title, authors, journal/venue, abstract, and publication date.
2. Then search specifically for "${doi}" on Google Scholar (scholar.google.com) and read the "Cited by N" number shown there for this paper. This is a required step — do not skip it. Use the Google Scholar citation count specifically, not Semantic Scholar or Crossref's count, since those differ.
3. Separately search for the current JCR impact factor of that journal.

Respond with ONLY a raw JSON object, no markdown code fences, no explanation, using exactly these keys: "title", "authors", "journal", "abstract", "pubDate", "impactFactor", "citationCount". Format authors in APA style as a single string, e.g. "Kim, J., & Lee, S.". Format pubDate as YYYY-MM-DD if the exact day is known, otherwise YYYY-MM or YYYY. Format impactFactor as a plain number string (e.g. "12.3"). Format citationCount as a plain number string reflecting the Google Scholar "Cited by" count (e.g. "128"), and use "0" (not null) if it genuinely shows zero. Use null only for a field you genuinely could not find after searching.`
        }]
      })
    });
    if(!resp.ok){
      status.textContent = "검색 요청이 실패했어요 — 아래 버튼으로 직접 확인해주세요.";
      return {title:null, authors:null, journal:null, abstract:null, pubDate:null, impactFactor:null, citationCount:null};
    }
    const data = await resp.json();
    const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
    const cleaned = textBlocks.replace(/```json/g, "").replace(/```/g, "").trim();
    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(jsonMatch ? jsonMatch[0] : cleaned);
    const found = parsed.title || parsed.authors || parsed.journal || parsed.abstract || parsed.pubDate || parsed.impactFactor || parsed.citationCount;
    status.textContent = found ? "논문 정보를 찾았어요. 확인 후 저장하세요." : "검색 결과에서 정보를 찾지 못했어요 — 아래 버튼으로 직접 확인해주세요.";
    return {
      title: parsed.title || null,
      authors: parsed.authors || null,
      journal: parsed.journal || null,
      abstract: parsed.abstract || null,
      pubDate: parsed.pubDate || null,
      impactFactor: parsed.impactFactor || null,
      citationCount: (parsed.citationCount === undefined || parsed.citationCount === null) ? null : String(parsed.citationCount)
    };
  }catch(e){
    status.textContent = "검색 중 오류가 발생했어요 — 아래 버튼으로 직접 확인해주세요.";
    return {title:null, authors:null, journal:null, abstract:null, pubDate:null, impactFactor:null, citationCount:null};
  }
}

function updateAPA(){
  const authors = document.getElementById('f_authors').value.trim();
  const title = document.getElementById('f_title').value.trim();
  const journal = document.getElementById('f_journal').value.trim();
  const pubDate = document.getElementById('f_pubdate').value.trim();
  const doi = document.getElementById('f_doi').value.trim();
  const out = document.getElementById('apaOutput');
  if(!authors && !title && !journal && !doi){
    out.textContent = "필드를 채우면 APA 인용이 자동으로 생성됩니다.";
    return;
  }
  const year = pubDate ? pubDate.slice(0,4) : "";
  let html = escapeHtml(authors || "저자 미상") + " ";
  html += year ? `(${escapeHtml(year)}). ` : "(n.d.). ";
  if(title) html += escapeHtml(title.replace(/\.\s*$/,"")) + ". ";
  if(journal) html += `<em>${escapeHtml(journal)}</em>. `;
  if(doi) html += `https://doi.org/${escapeHtml(doi)}`;
  out.innerHTML = html.trim();
}

function copyAPA(){
  const text = document.getElementById('apaOutput').innerText;
  const status = document.getElementById('statusLine');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      status.textContent = "APA 인용을 클립보드에 복사했어요.";
    }).catch(()=>{
      status.textContent = "복사에 실패했어요 — 직접 드래그해서 복사해주세요.";
    });
  }else{
    status.textContent = "이 환경에서는 자동 복사가 안 돼요 — 직접 드래그해서 복사해주세요.";
  }
}

    return;

  let url;

  else if(type === 'semantic') url = `https://www.semanticscholar.org/doi/${encodeURIComponent(doi)}`;
  else url = `https://scholar.google.com/scholar?q=${encodeURIComponent(doi)}`;
  window.open(url, '_blank');
}

/* ---------- PDF thumbnail ---------- */
async function renderPdfFirstPage(file){
  const status = document.getElementById('statusLine');
  status.textContent = "PDF 첫 페이지 불러오는 중...";
  try{
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({scale: 1});
    const targetWidth = 500;
    const scale = targetWidth / viewport.width;
    const scaledViewport = page.getViewport({scale});
    const canvas = document.createElement('canvas');
    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext: ctx, viewport: scaledViewport}).promise;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
    const thumb = document.getElementById('modalThumb');
    thumb.src = dataUrl;
    thumb.style.display = "block";
    status.textContent = "표지 이미지를 불러왔어요.";
  }catch(e){
    status.textContent = "PDF를 읽지 못했어요. 다른 파일을 시도해보세요.";
  }
}

document.getElementById('modalPdfInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) renderPdfFirstPage(file);
});

document.getElementById('pdfInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  openManualModal();
  await renderPdfFirstPage(file);
});

const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', (e)=>{ e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', ()=> dz.classList.remove('dragover'));
dz.addEventListener('drop', async (e)=>{
  e.preventDefault();
  dz.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if(files && files.length>0 && files[0].type === 'application/pdf'){
    openManualModal();
    await renderPdfFirstPage(files[0]);
    return;
  }
  const uri = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
  if(uri){
    openManualModal();
    document.getElementById('f_url').value = uri.trim();
    const doi = extractDoi(uri);
    if(doi){
      document.getElementById('f_doi').value = doi;
      const meta = await fetchMetadata(doi);
      if(meta.title) document.getElementById('f_title').value = meta.title;
      if(meta.authors) document.getElementById('f_authors').value = meta.authors;
      if(meta.journal) document.getElementById('f_journal').value = meta.journal;
      if(meta.abstract) document.getElementById('f_abstract').value = meta.abstract;
      if(meta.pubDate) document.getElementById('f_pubdate').value = meta.pubDate;
      if(meta.impactFactor) document.getElementById('f_if').value = meta.impactFactor;
      if(meta.citationCount !== null && meta.citationCount !== undefined) document.getElementById('f_citations').value = meta.citationCount;
      updateAPA();
    }else{
      document.getElementById('statusLine').textContent = "링크에서 DOI를 찾지 못했어요 — 직접 입력해주세요.";
    }
  }
});

document.getElementById('f_doi').addEventListener('blur', async (e)=>{
  const doi = e.target.value.trim();
  if(!doi) return;
  const titleEmpty = !document.getElementById('f_title').value.trim();
  if(titleEmpty){
    const meta = await fetchMetadata(doi);
    if(meta.title) document.getElementById('f_title').value = meta.title;
    if(meta.authors) document.getElementById('f_authors').value = meta.authors;
    if(meta.journal) document.getElementById('f_journal').value = meta.journal;
    if(meta.abstract) document.getElementById('f_abstract').value = meta.abstract;
    if(meta.pubDate) document.getElementById('f_pubdate').value = meta.pubDate;
    if(meta.impactFactor) document.getElementById('f_if').value = meta.impactFactor;
    if(meta.citationCount !== null && meta.citationCount !== undefined) document.getElementById('f_citations').value = meta.citationCount;
    updateAPA();
  }
});

(async function init(){
  await loadCategories();
  await loadPapers();
  await loadNotes();
  renderTabs();
  render();
  renderNotes();
})();
</script>
